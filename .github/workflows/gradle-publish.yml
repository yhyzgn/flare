name: Publish to Maven Central

on:
  push:
    tags:
      - 'v*' # 触发规则：当推送类似 v1.0.0, v2.1.3 的 tag 时运行

jobs:
  publish:
    name: Release build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle' # 开启 Gradle 缓存，加快构建

      - name: Extract Version Name
        id: extract_version
        run: echo "VERSION_NAME=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV # 这一步把 v1.0.0 转换成 1.0.0 并存入环境变量，方便 Gradle 使用

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@af1da67850ed9a4cedd57bfd976089dd991e2582 # v4.0.0

      - name: Publish to Maven Central
        run: ./gradlew publishToMavenCentral --no-daemon
        env:
          # 映射 GitHub Secrets 到 Gradle 环境变量
          # vanniktech 插件会自动识别这些特定的环境变量名
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MVNC_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MVNC_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}
          ORG_GRADLE_PROJECT_VERSION_NAME: ${{ env.VERSION_NAME }} #  build.gradle 里版本号是动态读取的，可以在这里传进去
          
