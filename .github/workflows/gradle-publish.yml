name: Publish to Maven Central

on:
  push:
    tags:
      - 'v*' # 触发规则：当推送类似 v1.0.0, v2.1.3 的 tag 时运行

jobs:
  publish:
    name: Release build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract Version Name
        id: extract_version
        run: |
          # 提取版本号（去掉 v）
          echo "VERSION_NAME=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV
          # 保留原始 tag 名
          echo "TAG_NAME=${GITHUB_REF_NAME}" >> $GITHUB_ENV

      - name: Update Version in ext.gradle
        run: |
          echo "Updating version to ${{ env.VERSION_NAME }} in ext.gradle"
          sed -i "s/version = \".*\"/version = \"${{ env.VERSION_NAME }}\"/g" ./ext.gradle
          echo "Updated ./ext.gradle content:"
          cat ./ext.gradle

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle' # 开启 Gradle 缓存，加快构建

      - name: Publish to Maven Central
        run: ./gradlew clean compileJava publishToMavenCentral --no-daemon
        env:
          # 映射 GitHub Secrets 到 Gradle 环境变量
          # vanniktech 插件会自动识别这些特定的环境变量名
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MVNC_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MVNC_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: Release ${{ env.TAG_NAME }}
          # 自动生成更新日志（基于 commit 记录）
          generate_release_notes: true
          # 如果你想把编译出的 jar 包也传到 Release 里，可以加上：
          files: build/libs/*.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
